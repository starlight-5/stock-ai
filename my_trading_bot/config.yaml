# V1 SMC 자동매매 봇 설정 파일
# 이 파일을 수정하여 전략 파라미터를 조정하세요.

strategy: "v1_smc"

# ─────────────────────────────────────────────────
# 거래 종목 설정
# ─────────────────────────────────────────────────
trading:
  excd: "NAS"          # 거래소 코드 (NAS=나스닥, NYS=뉴욕, AMS=아멕스)
  symbol: "AAPL"       # 거래 종목 코드
  hts_id: ""           # 체결통보 수신용 HTS ID (KIS 로그인 ID)

# ─────────────────────────────────────────────────
# 리스크 관리 파라미터
# ─────────────────────────────────────────────────
risk:
  daily_drawdown_limit: -0.05   # 일일 최대 허용 손실율 (-5%)
  trade_risk_ratio: 0.02        # 1회 매매 리스크 비율 (2%)

# ─────────────────────────────────────────────────
# 익절 / 손절 파라미터
# ─────────────────────────────────────────────────
tp_sl:
  tp1_rr: 1.5           # 1차 TP RR 배율
  tp2_rr_fallback: 2.0  # 2차 TP 고정 RR 배율 (유동성 풀 없을 때)
  commission: 0.005     # 왕복 수수료율 (0.5%)
  tp1_close_ratio: 0.5  # 1차 TP 시 청산 비율 (50%)

# ─────────────────────────────────────────────────
# 환경 설정
# ─────────────────────────────────────────────────
env:
  mode: "demo"          # "real" = 실전, "demo" = 모의투자
  log_level: "INFO"