# V1 SMC 자동매매 봇 설정 파일
# 이 파일을 수정하여 전략 파라미터를 조정하세요.

strategy: "v1_smc"

# ─────────────────────────────────────────────────
# 거래 종목 설정
# ─────────────────────────────────────────────────
trading:
  market_type: "KR"      # 시장 타입 (KR=국내, US=해외)
  excd: "KR"             # 거래소 코드 (KR=국내, NAS=나스닥, NYS=뉴욕, AMS=아먱스)
  symbol: "005930"       # 기본 거래 종목 (삼성전자)
  # KEY, SECRET, HTS_ID, 계좌번호 등 인증정보는
  # 모두 .env 파일에서 관리합니다. (KIS_APP_KEY, KIS_HTS_ID 등)

# ─────────────────────────────────────────────────
# 리스크 관리 파라미터
# ─────────────────────────────────────────────────
risk:
  daily_drawdown_limit: -0.05   # 일일 최대 허용 손실율 (-5%)
  trade_risk_ratio: 0.02        # 1회 매매 리스크 비율 (2%)

# ─────────────────────────────────────────────────
# 익절 / 손절 파라미터
# ─────────────────────────────────────────────────
tp_sl:
  tp1_rr: 1.5           # 1차 TP RR 배율
  tp2_rr_fallback: 2.0  # 2차 TP 고정 RR 배율 (유동성 풀 없을 때)
  commission: 0.005     # 왕복 수수료율 (0.5%)
  tp1_close_ratio: 0.5  # 1차 TP 시 청산 비율 (50%)

# ─────────────────────────────────────────────────
# 환경 설정
# ─────────────────────────────────────────────────
env:
  log_level: "INFO"
  # mode(real/demo)는 .env 의 KIS_ENV 값이 우선 적용됩니다.
  mode: "demo"          # .env 의 KIS_ENV 값이 없을 때 기본값